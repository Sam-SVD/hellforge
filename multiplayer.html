<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hellforge 8</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 20%, rgba(151,33,36,.55), transparent 35%),
        linear-gradient(180deg, #0b080d, #171015 55%, #070709);
      color: #ffe8c7;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 22px;
    }
    .panel {
      width: min(760px, 100%);
      border: 3px solid #7d2636;
      background: rgba(9,7,10,.88);
      box-shadow: 0 30px 90px rgba(0,0,0,.75), 0 0 0 3px rgba(255, 211, 101, .12);
      padding: 28px;
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(42px, 10vw, 84px);
      color: #ffcc5c;
      text-shadow: 5px 5px 0 #6b1726;
      letter-spacing: 1px;
      line-height: .9;
    }
    p { line-height: 1.5; color: #f6d6ac; }
    .buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 22px;
    }
    a {
      display: block;
      text-decoration: none;
      color: #13090b;
      font-weight: 1000;
      padding: 18px 20px;
      background: #ffcc5c;
      border: 3px solid #fff1b3;
      box-shadow: 0 7px 0 #7d2636;
      font-size: 20px;
    }
    a:hover { transform: translateY(-2px); }
    .small {
      margin-top: 22px;
      font-size: 13px;
      color: #b99b7c;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>HELLFORGE 8</h1>
    <p>Choose how you want to play.</p>
    <div class="buttons">
      <a href="/single_player.html">Single Player — Restored Original Shotgun</a>
      <a href="/multiplayer.html">Multiplayer 1v1 Arena — Invite Code</a>
    </div>
    <p class="small">Multiplayer needs this app running on Render or another Node server.</p>
  </main>
</body>
</html>
